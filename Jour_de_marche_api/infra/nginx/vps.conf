# ============================================================
# Nginx — Reverse proxy VPS IONOS → Node.js port 5000
# Emplacement : /etc/nginx/sites-available/jour-de-marche
# Activer     : ln -s /etc/nginx/sites-available/jour-de-marche \
#                       /etc/nginx/sites-enabled/jour-de-marche
# Tester      : nginx -t
# Recharger   : systemctl reload nginx
# ============================================================

upstream jour_de_marche_api {
    server 127.0.0.1:5000;
    keepalive 64;
}

# Redirection HTTP → HTTPS (décommentez après avoir configuré SSL)
# server {
#     listen 80;
#     server_name votre-domaine.com www.votre-domaine.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name jour.marche.blueredc.com;

    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/jour-de-marche-access.log;
    error_log  /var/log/nginx/jour-de-marche-error.log;

    # En-têtes de sécurité
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # Compression Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml
               application/javascript application/json;

    # Interdire l'accès aux fichiers sensibles
    location ~ /\.env {
        deny all;
        return 404;
    }
    location ~ /\. {
        deny all;
    }

    # Fichiers uploadés (servis directement par Nginx)
    location /uploads/ {
        alias /var/www/jour-de-marche/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Resource-Policy "cross-origin";
    }

    # Documentation Swagger
    location /api-docs {
        proxy_pass http://jour_de_marche_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (accès direct sans rate limit)
    location /health {
        proxy_pass         http://jour_de_marche_api/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

    # API principale
    location / {
        proxy_pass         http://jour_de_marche_api;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass                 $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

